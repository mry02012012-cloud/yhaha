<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>Snake IDE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1e1e1e;--bg2:#252526;--bg3:#2d2d30;--bg4:#3c3c3c;
  --fg:#d4d4d4;--fg2:#858585;--act:#0078d4;--green:#6a9955;
  --yellow:#dcdcaa;--orange:#ce9178;--purple:#c586c0;--red:#f44747;
  --font:'Consolas','Courier New',monospace;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--fg);
  font-family:'Segoe UI',sans-serif;font-size:13px;}
body{display:flex;flex-direction:column;}
/* HEADER */
#hdr{height:38px;background:#323233;display:flex;align-items:center;
  gap:8px;padding:0 12px;flex-shrink:0;border-bottom:1px solid #252526;}
.logo{font-size:14px;font-weight:600;color:#4ec9b0;margin-right:4px;}
.btn{border:none;padding:4px 12px;cursor:pointer;border-radius:3px;
  font-size:12px;font-family:inherit;}
.btn-run{background:#0078d4;color:#fff;}.btn-run:hover{background:#106ebe;}
.btn-sm{background:none;color:#858585;border:1px solid #444;font-size:12px;}
.btn-sm:hover{color:#ccc;border-color:#888;}
#hdr-right{margin-left:auto;font-size:11px;color:#444;}
/* LAYOUT */
#body{display:flex;flex:1;overflow:hidden;}
/* SIDEBAR */
#sidebar{width:200px;background:var(--bg2);border-right:1px solid #333;
  display:flex;flex-direction:column;flex-shrink:0;}
.sb-title{padding:6px 12px;font-size:10px;font-weight:700;color:#858585;
  text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #333;
  display:flex;align-items:center;justify-content:space-between;}
.sb-title button{background:none;border:none;color:#555;cursor:pointer;
  font-size:14px;padding:0 3px;}.sb-title button:hover{color:#ccc;}
#file-list{flex:1;overflow-y:auto;padding:4px 0;}
.fi{display:flex;align-items:center;padding:3px 8px 3px 14px;font-size:12px;
  cursor:pointer;color:#ccc;gap:5px;white-space:nowrap;overflow:hidden;}
.fi:hover{background:#2a2d2e;}.fi.active{background:#37373d;color:#fff;}
.fi-name{flex:1;overflow:hidden;text-overflow:ellipsis;}
.fi-x{background:none;border:none;color:#444;cursor:pointer;font-size:12px;
  padding:0 2px;opacity:0;}.fi:hover .fi-x{opacity:1;}.fi-x:hover{color:#f44747;}
.fi-dot{width:6px;height:6px;border-radius:50%;background:#e2c08d;
  flex-shrink:0;display:none;}.fi.modified .fi-dot{display:block;}
#outline-title{padding:5px 12px;font-size:10px;font-weight:700;color:#858585;
  text-transform:uppercase;letter-spacing:1px;border-top:1px solid #333;
  border-bottom:1px solid #333;}
#outline{max-height:140px;overflow-y:auto;}
.ol-item{padding:2px 8px 2px 16px;font-size:11px;cursor:pointer;
  display:flex;align-items:center;gap:5px;}
.ol-item:hover{background:#2a2d2e;}
.ol-fn{color:#dcdcaa;}.ol-var{color:#9cdcfe;}
/* EDITOR AREA */
#editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
/* TABS */
#tabs{height:35px;background:var(--bg3);display:flex;align-items:flex-end;
  border-bottom:1px solid #333;flex-shrink:0;overflow-x:auto;}
#tabs::-webkit-scrollbar{height:2px;}
.tab{display:flex;align-items:center;gap:5px;padding:0 12px;height:35px;
  font-size:12px;cursor:pointer;color:#858585;border-right:1px solid #333;
  background:var(--bg3);white-space:nowrap;flex-shrink:0;}
.tab.active{background:var(--bg);color:#fff;border-top:1px solid var(--act);}
.tab:hover{color:#ccc;}
.tab-x{font-size:13px;color:#444;margin-left:3px;padding:0 2px;border-radius:2px;}
.tab:hover .tab-x,.tab.active .tab-x{color:#858585;}
.tab-x:hover{color:#fff!important;background:rgba(255,255,255,.1);}
.tab.modified .tab-x::before{content:'●';font-size:8px;}
.tab:not(.modified) .tab-x::before{content:'×';}
/* FIND BAR */
#find-bar{display:none;background:var(--bg2);border-bottom:1px solid #333;
  padding:5px 10px;gap:6px;align-items:center;flex-shrink:0;}
#find-bar.show{display:flex;}
#find-bar input{background:#3c3c3c;border:1px solid #555;color:var(--fg);
  padding:3px 8px;font-size:12px;border-radius:2px;outline:none;
  font-family:var(--font);width:180px;}
#find-bar input:focus{border-color:var(--act);}
.fb-btn{background:none;border:1px solid #444;color:#858585;padding:2px 7px;
  font-size:11px;border-radius:2px;cursor:pointer;}.fb-btn:hover{color:#ccc;}
.fb-tog{background:none;border:1px solid transparent;color:#858585;
  padding:2px 5px;font-size:11px;border-radius:2px;cursor:pointer;}
.fb-tog:hover,.fb-tog.on{background:#3c3c3c;border-color:#555;color:#ccc;}
#find-count{font-size:11px;color:#858585;min-width:55px;}
/* EDITOR */
#editor-wrap{flex:1;display:flex;overflow:hidden;}
#lnums{background:var(--bg);color:#4a4a4a;padding:8px 10px 8px 8px;
  font-size:13px;line-height:20px;text-align:right;user-select:none;
  overflow:hidden;flex-shrink:0;font-family:var(--font);
  border-right:1px solid #2a2a2a;min-width:44px;}
.ln-cur{color:#ccc!important;}
#code-wrap{flex:1;position:relative;overflow:hidden;}
#hl{position:absolute;inset:0;padding:8px 8px 8px 12px;font-family:var(--font);
  font-size:13px;line-height:20px;white-space:pre;overflow:hidden;
  pointer-events:none;z-index:1;word-break:normal;}
#editor{position:absolute;inset:0;background:transparent;color:transparent;
  caret-color:#aeafad;border:none;outline:none;padding:8px 8px 8px 12px;
  font-family:var(--font);font-size:13px;line-height:20px;resize:none;
  tab-size:4;white-space:pre;overflow:auto;z-index:2;
  -webkit-text-fill-color:transparent;}
/* SYNTAX */
.k{color:#569cd6;font-weight:500;}.f{color:#dcdcaa;}.s{color:#ce9178;}
.n{color:#b5cea8;}.c{color:#6a9955;font-style:italic;}.b{color:#4ec9b0;}
.v{color:#9cdcfe;}
/* AUTOCOMPLETE */
#ac{display:none;position:absolute;background:#252526;border:1px solid #454545;
  border-radius:3px;box-shadow:0 4px 16px rgba(0,0,0,.5);z-index:100;
  max-height:180px;overflow-y:auto;min-width:180px;}
.ac-i{padding:4px 12px;font-size:12px;font-family:var(--font);cursor:pointer;
  display:flex;align-items:center;gap:8px;color:var(--fg);}
.ac-i:hover,.ac-i.sel{background:var(--act);}
.ac-t{font-size:10px;color:#858585;margin-left:auto;}
.ac-i.sel .ac-t,.ac-i:hover .ac-t{color:rgba(255,255,255,.6);}
/* STATUS */
#statusbar{height:22px;background:var(--act);color:#fff;display:flex;
  align-items:center;flex-shrink:0;}
.sbi{padding:0 8px;height:22px;display:flex;align-items:center;gap:4px;
  cursor:pointer;font-size:11px;white-space:nowrap;}
.sbi:hover{background:rgba(255,255,255,.15);}
/* TERMINAL */
#terminal{height:220px;background:#0c0c0c;border-top:2px solid var(--act);
  display:flex;flex-direction:column;flex-shrink:0;}
#term-hdr{background:var(--bg2);height:35px;display:flex;align-items:center;
  border-bottom:1px solid #333;flex-shrink:0;}
.ptab{height:35px;display:flex;align-items:center;padding:0 14px;font-size:11px;
  color:#858585;cursor:pointer;border-bottom:2px solid transparent;
  text-transform:uppercase;letter-spacing:.5px;}
.ptab.active{color:#fff;border-bottom-color:var(--act);}.ptab:hover{color:#ccc;}
.term-acts{margin-left:auto;display:flex;align-items:center;gap:2px;padding-right:8px;}
.term-acts button{background:none;border:none;color:#555;cursor:pointer;
  padding:3px 6px;border-radius:3px;font-size:12px;}
.term-acts button:hover{color:#ccc;}
.tpanel{display:none;flex:1;overflow-y:auto;padding:4px 12px;font-size:12px;
  font-family:var(--font);}
.tpanel.active{display:block;}
.tl{line-height:1.5;padding:1px 0;word-break:break-all;}
.ok{color:#4ec9b0;}.err{color:#f44747;}.info{color:#75beff;}
.warn{color:#dcdcaa;}.cmd{color:#569cd6;font-size:11px;}
#term-in-row{display:flex;align-items:center;padding:3px 12px 5px;
  background:#111;gap:6px;border-top:1px solid #222;flex-shrink:0;}
#term-prompt{color:#569cd6;font-size:12px;font-family:var(--font);white-space:nowrap;}
#term-in{background:transparent;border:none;outline:none;color:#ccc;flex:1;
  font-size:12px;font-family:var(--font);}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#424242;}
::-webkit-scrollbar-thumb:hover{background:#555;}
</style></head><body>

<div id="hdr">
  <div class="logo">&#x1F40D; Snake IDE</div>
  <button class="btn btn-run" onclick="runCode()">&#9654; Run (Ctrl+Enter)</button>
  <button class="btn btn-sm" onclick="toggleFind()">Find (Ctrl+F)</button>
  <button class="btn btn-sm" onclick="newFile()">+ New</button>
  <button class="btn btn-sm" onclick="saveFile()">Save (Ctrl+S)</button>
  <div id="hdr-right">Ctrl+Space = Autocomplete &nbsp;|&nbsp; Ctrl+/ = Comment</div>
</div>
<div id="body">
  <div id="sidebar">
    <div class="sb-title">Explorer
      <div><button onclick="newFile()" title="New">+</button>
           <button onclick="deleteActiveFile()" title="Delete">&#x1F5D1;</button></div>
    </div>
    <div id="file-list"></div>
    <div id="outline-title">Outline</div>
    <div id="outline"></div>
  </div>
  <div id="editor-area">
    <div id="tabs"></div>
    <div id="find-bar">
      <input type="text" id="find-input" placeholder="Find..." oninput="Find.search(this.value)" onkeydown="Find.key(event)" autocomplete="off">
      <button class="fb-tog" id="fb-case" onclick="Find.toggleCase()" title="Match Case">Aa</button>
      <button class="fb-tog" id="fb-regex" onclick="Find.toggleRegex()" title="Regex">.*</button>
      <span id="find-count"></span>
      <button class="fb-btn" onclick="Find.prev()">&#8593;</button>
      <button class="fb-btn" onclick="Find.next()">&#8595;</button>
      <span style="width:1px;height:16px;background:#444;"></span>
      <input type="text" id="replace-input" placeholder="Replace..." autocomplete="off"
        style="background:#3c3c3c;border:1px solid #555;color:#d4d4d4;padding:3px 8px;
               font-size:12px;border-radius:2px;outline:none;font-family:Consolas,monospace;width:160px;">
      <button class="fb-btn" onclick="Find.replaceOne()">Replace</button>
      <button class="fb-btn" onclick="Find.replaceAll()">All</button>
      <button class="fb-btn" onclick="toggleFind(false)" style="margin-left:auto;">&#x2715;</button>
    </div>
    <div id="editor-wrap">
      <div id="lnums"></div>
      <div id="code-wrap">
        <div id="hl"></div>
        <textarea id="editor" spellcheck="false" autocomplete="off"
          autocorrect="off" autocapitalize="off"></textarea>
      </div>
      <div id="ac"></div>
    </div>
    <div id="statusbar">
      <div class="sbi">&#x1F40D; Snake Project</div>
      <div class="sbi" id="sb-pos">Ln 1, Col 1</div>
      <div class="sbi" id="sb-sel" style="display:none;"></div>
      <div class="sbi" style="margin-left:auto;">Spaces: 4</div>
      <div class="sbi">UTF-8</div>
      <div class="sbi">Snake Lang</div>
      <div class="sbi" id="sb-status">Ready</div>
      <div class="sbi" onclick="runCode()" style="background:rgba(255,255,255,.12);">&#9654; Run</div>
    </div>
  </div>
</div>
<div id="terminal">
  <div id="term-hdr">
    <div class="ptab active" onclick="switchPanel('terminal')">Terminal</div>
    <div class="ptab" onclick="switchPanel('output')">Output</div>
    <div class="term-acts">
      <button onclick="clearPanel()">&#x1F5D1;</button>
      <button onclick="document.getElementById('terminal').style.display='none'">&#x2715;</button>
    </div>
  </div>
  <div style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
    <div class="tpanel active" id="panel-terminal">
      <div class="tl info">Snake IDE &#8212; type 'help' for commands, Ctrl+Enter to run</div>
    </div>
    <div class="tpanel" id="panel-output"></div>
  </div>
  <div id="term-in-row">
    <span id="term-prompt">snake:~$</span>
    <input type="text" id="term-in" spellcheck="false" autocomplete="off" placeholder="type a command...">
  </div>
</div>
<script>
// ── Env ──────────────────────────────────────────────────────
class Env{
  constructor(p){this.v=new Map();this.p=p;}
  get(n){if(this.v.has(n))return this.v.get(n);if(this.p)return this.p.get(n);throw new Error("Undefined '"+n+"'");}
  set(n,v){this.v.set(n,v);}
  assign(n,v){if(this.v.has(n)){this.v.set(n,v);return;}if(this.p){this.p.assign(n,v);return;}throw new Error("Undeclared '"+n+"' — use let");}
  has(n){return this.v.has(n)||(this.p?this.p.has(n):false);}
}
// ── Tokenizer ─────────────────────────────────────────────────
function tokenize(src){
  const t=[],push=(a,b,l,c)=>t.push({t:a,v:b,line:l,col:c});
  let i=0,line=1,col=1;
  while(i<src.length){
    const c=src[i];
    if(c==='\n'){line++;col=1;i++;continue;}
    if(c===' '||c==='\t'||c==='\r'){col++;i++;continue;}
    if(c==='#'){while(i<src.length&&src[i]!=='\n')i++;continue;}
    if(c==='"'||c==="'"){
      const q=c,sl=line,sc=col;let s='';i++;col++;
      while(i<src.length&&src[i]!==q){
        if(src[i]==='\\'){i++;const e={n:'\n',t:'\t','\\':'\\','"':'"',"'":"'"};s+=e[src[i]]||src[i];}
        else{if(src[i]==='\n')line++;s+=src[i];}
        i++;col++;
      }
      if(i>=src.length)throw new Error('Unterminated string at line '+sl);
      i++;push('STR',s,sl,sc);continue;
    }
    if(c>='0'&&c<='9'){
      let n='';const nl=line,nc=col;
      while(i<src.length&&(src[i]>='0'&&src[i]<='9'||src[i]==='.')){n+=src[i++];col++;}
      push('NUM',parseFloat(n),nl,nc);continue;
    }
    const t2=src.slice(i,i+2);
    if(['==','!=','<=','>=','..','&&','||','->'].includes(t2)){push('OP',t2,line,col);i+=2;col+=2;continue;}
    if(c==='?'){push('?',c,line,col);i++;col++;continue;}
    if(c===':'){push(':',c,line,col);i++;col++;continue;}
    if(c==='.'){push('.',c,line,col);i++;col++;continue;}
    if('+-*/%<>=!&|^~'.includes(c)){push('OP',c,line,col);i++;col++;continue;}
    if('(){}[];,'.includes(c)){push(c,c,line,col);i++;col++;continue;}
    if(/[a-zA-Z_]/.test(c)){
      let id='';const il=line,ic=col;
      while(i<src.length&&/\w/.test(src[i])){id+=src[i++];col++;}
      const KW=['let','const','fn','give','when','otherwise','loop','repeat','as',
                'each','in','try','catch','throw','stop','skip','match','case',
                'true','false','null','and','or','not','new'];
      push(KW.includes(id)?'KW':'ID',id,il,ic);continue;
    }
    i++;col++;
  }
  t.push({t:'EOF',v:'',line,col});return t;
}
// ── Parser ────────────────────────────────────────────────────
function parse(toks){
  let p=0;
  const pk=(n=0)=>toks[p+n]||{t:'EOF',v:''};
  const adv=()=>toks[p++]||{t:'EOF',v:''};
  const expect=(t,v)=>{const k=adv();if(k.t!==t||(v!==undefined&&k.v!==v))throw new Error('Expected '+(v||t)+' got \''+k.v+'\' at line '+k.line);return k;};
  const match=(t,v)=>{if(pk().t===t&&(v===undefined||pk().v===v)){adv();return true;}return false;};
  const block=()=>{expect('{');const s=[];while(pk().t!=='}'){if(pk().t==='EOF')throw new Error('Unclosed {');s.push(stmt());}adv();return s;};
  const params=()=>{const ps=[];while(pk().t!==')'){const n=expect('ID').v;let d=null;if(pk().t==='OP'&&pk().v==='='){adv();d=expr();}ps.push({n,d});if(!match(','))break;}return ps;};
  const args=()=>{const a=[];while(pk().t!==')'){a.push(expr());if(!match(','))break;}return a;};

  function stmt(){
    const tok=pk();
    if(tok.t==='KW'){
      if(tok.v==='let'||tok.v==='const'){adv();const n=expect('ID').v;expect('OP','=');const v=expr();return{t:'Let',n,v,line:tok.line};}
      if(tok.v==='fn'&&pk(1).t==='ID'){adv();const n=expect('ID').v;expect('(');const ps=params();expect(')');return{t:'Fn',n,ps,b:block(),line:tok.line};}
      if(tok.v==='give'){adv();const v=expr();return{t:'Give',v,line:tok.line};}
      if(tok.v==='stop'){adv();return{t:'Stop'};}
      if(tok.v==='skip'){adv();return{t:'Skip'};}
      if(tok.v==='throw'){adv();const v=expr();return{t:'Throw',v,line:tok.line};}
      if(tok.v==='when'){
        adv();const c=expr();const th=block();const branches=[];
        while(pk().t==='KW'&&pk().v==='otherwise'){adv();
          if(pk().t==='KW'&&pk().v==='when'){adv();const c2=expr();const b=block();branches.push({c:c2,b});}
          else{branches.push({c:null,b:block()});break;}}
        return{t:'When',c,th,branches,line:tok.line};
      }
      if(tok.v==='loop'){adv();return{t:'Loop',b:block(),line:tok.line};}
      if(tok.v==='repeat'){adv();const n=expr();let iter=null;if(pk().t==='KW'&&pk().v==='as'){adv();iter=expect('ID').v;}return{t:'Rep',n,iter,b:block(),line:tok.line};}
      if(tok.v==='each'){adv();const n=expect('ID').v;expect('KW','in');const arr=expr();return{t:'Each',n,arr,b:block(),line:tok.line};}
      if(tok.v==='try'){adv();const tb=block();expect('KW','catch');expect('(');const en=expect('ID').v;expect(')');return{t:'Try',tb,en,cb:block(),line:tok.line};}
      if(tok.v==='match'){adv();const v=expr();expect('{');const cases=[];while(pk().t!=='}'){expect('KW','case');const pat=expr();const b=block();cases.push({pat,b});}adv();return{t:'Match',v,cases,line:tok.line};}
    }
    const e=expr();
    // assignment
    if(pk().t==='OP'&&pk().v==='='){adv();const v=expr();return{t:'Asgn',target:e,v,line:tok.line};}
    return{t:'Expr',e};
  }

  function expr(){return ternary();}
  function ternary(){let l=or();if(pk().t==='?'){adv();const a=expr();expect(':');const b=expr();return{t:'Tern',c:l,a,b};}return l;}
  function or(){let l=and();while((pk().t==='KW'&&pk().v==='or')||(pk().t==='OP'&&pk().v==='||')){adv();l={t:'Bin',op:'||',l,r:and()};}return l;}
  function and(){let l=not();while((pk().t==='KW'&&pk().v==='and')||(pk().t==='OP'&&pk().v==='&&')){adv();l={t:'Bin',op:'&&',l,r:not()};}return l;}
  function not(){if((pk().t==='KW'&&pk().v==='not')||(pk().t==='OP'&&pk().v==='!')){adv();return{t:'Un',op:'!',v:not()};}return cmp();}
  function cmp(){let l=add();while(pk().t==='OP'&&['==','!=','<','>','<=','>='].includes(pk().v)){const op=adv().v;l={t:'Bin',op,l,r:add()};}return l;}
  function add(){let l=mul();while(pk().t==='OP'&&['+','-','..'].includes(pk().v)){const op=adv().v;l={t:'Bin',op,l,r:mul()};}return l;}
  function mul(){let l=un();while(pk().t==='OP'&&['*','/','%'].includes(pk().v)){const op=adv().v;l={t:'Bin',op,l,r:un()};}return l;}
  function un(){if(pk().t==='OP'&&pk().v==='-'){adv();return{t:'Un',op:'-',v:un()};}return post();}
  function post(){
    let e=prim();
    while(true){
      if(pk().t==='.'){adv();const f=expect('ID').v;
        if(pk().t==='('){adv();const a=args();expect(')');e={t:'Method',o:e,f,a};}
        else e={t:'Field',o:e,f};}
      else if(pk().t==='['){adv();const i=expr();expect(']');e={t:'Idx',o:e,i};}
      else if(pk().t==='('){adv();const a=args();expect(')');e={t:'Call',f:e,a};}
      else break;
    }
    return e;
  }
  function prim(){
    const tok=pk();
    if(tok.t==='NUM'){adv();return{t:'Num',v:tok.v};}
    if(tok.t==='STR'){adv();return{t:'Str',v:tok.v};}
    if(tok.t==='KW'&&tok.v==='true'){adv();return{t:'Bool',v:true};}
    if(tok.t==='KW'&&tok.v==='false'){adv();return{t:'Bool',v:false};}
    if(tok.t==='KW'&&tok.v==='null'){adv();return{t:'Null'};}
    if(tok.t==='['){adv();const els=[];while(pk().t!==']'){els.push(expr());if(!match(','))break;}expect(']');return{t:'Arr',els};}
    if(tok.t==='{'){adv();const pairs=[];while(pk().t!=='}'){const k=adv().v;expect(':');const v=expr();pairs.push({k,v});if(!match(','))break;}expect('}');return{t:'Obj',pairs};}
    if(tok.t==='KW'&&tok.v==='fn'){adv();expect('(');const ps=params();expect(')');return{t:'Lambda',ps,b:block()};}
    if(tok.t==='('){adv();const e=expr();expect(')');return e;}
    if(tok.t==='ID'){adv();if(pk().t==='('){adv();const a=args();expect(')');return{t:'CallN',n:tok.v,a,line:tok.line};}return{t:'Var',n:tok.v,line:tok.line};}
    throw new Error("Unexpected '"+tok.v+"' at line "+tok.line);
  }

  const stmts=[];while(pk().t!=='EOF')stmts.push(stmt());return stmts;
}

<script>
// ── Evaluator ─────────────────────────────────────────────────
class RetSig{constructor(v){this.v=v;}}
class StopSig{}
class SkipSig{}

const Engine={
  MAX:50000,_iter:0,
  run(src){
    this._iter=0;
    const env=new Env(null);
    this.builtins(env);
    this.execBlock(parse(tokenize(src)),env);
  },
  builtins(env){
    env.set('PI',Math.PI);env.set('E',Math.E);env.set('INF',Infinity);
    const bi=(n,f)=>env.set(n,{__b__:n,__f__:f});
    bi('say',a=>{tlog(a.map(x=>this.str(x)).join(' '));return null;});
    bi('ask',a=>prompt(a[0]||'')||'');
    bi('size',a=>Array.isArray(a[0])?a[0].length:typeof a[0]==='string'?a[0].length:typeof a[0]==='object'&&a[0]?Object.keys(a[0]).length:0);
    bi('num',a=>Number(a[0]));
    bi('text',a=>this.str(a[0]));
    bi('floor',a=>Math.floor(a[0]));
    bi('ceil',a=>Math.ceil(a[0]));
    bi('abs',a=>Math.abs(a[0]));
    bi('rand',a=>Math.random()*(a[0]||1));
    bi('sqrt',a=>Math.sqrt(a[0]));
    bi('max',a=>Math.max(...(Array.isArray(a[0])?a[0]:a)));
    bi('min',a=>Math.min(...(Array.isArray(a[0])?a[0]:a)));
    bi('type',a=>Array.isArray(a[0])?'array':a[0]===null?'null':typeof a[0]);
    bi('upper',a=>String(a[0]).toUpperCase());
    bi('lower',a=>String(a[0]).toLowerCase());
    bi('trim',a=>String(a[0]).trim());
    bi('split',a=>String(a[0]).split(a[1]!==undefined?a[1]:','));
    bi('join',a=>Array.isArray(a[0])?a[0].join(a[1]!==undefined?a[1]:', '):String(a[0]));
    bi('push',a=>{if(Array.isArray(a[0])){a[0].push(a[1]);return a[0];}return null;});
    bi('pop',a=>Array.isArray(a[0])?a[0].pop():null);
    bi('has',a=>Array.isArray(a[0])?a[0].includes(a[1]):a[1] in (a[0]||{}));
    bi('keys',a=>Object.keys(a[0]||{}));
    bi('sort',a=>{const arr=[...a[0]];a[1]?arr.sort((x,y)=>this.callFn(a[1],[x,y])):arr.sort();return arr;});
    bi('reverse',a=>[...a[0]].reverse());
    bi('map',a=>a[0].map(x=>this.callFn(a[1],[x])));
    bi('filter',a=>a[0].filter(x=>this.truthy(this.callFn(a[1],[x]))));
    bi('reduce',a=>a[0].reduce((acc,x)=>this.callFn(a[1],[acc,x]),a[2]));
    bi('now',a=>Date.now());
    bi('range',a=>{const[s,e,st=1]=a;const r=[];for(let i=s;i<e;i+=st)r.push(i);return r;});
  },
  callFn(fn,args){
    if(fn&&fn.__b__)return fn.__f__(args);
    if(fn&&fn.__fn__){
      const fe=new Env(fn.cl);
      fn.ps.forEach((p,i)=>{fe.set(p.n,args[i]!==undefined?args[i]:(p.d?this.eval(p.d,fn.cl):null));});
      const r=this.execBlock(fn.b,fe);
      return r instanceof RetSig?r.v:null;
    }
    if(typeof fn==='function')return fn(...args);
    throw new Error('Not callable: '+this.str(fn));
  },
  execBlock(ss,env){
    for(const s of ss){
      if(++this._iter>this.MAX)throw new Error('Max iterations exceeded');
      const r=this.execStmt(s,env);
      if(r instanceof RetSig||r instanceof StopSig||r instanceof SkipSig)return r;
    }
  },
  execStmt(s,env){
    switch(s.t){
      case 'Let':env.set(s.n,this.eval(s.v,env));break;
      case 'Fn':env.set(s.n,{__fn__:true,ps:s.ps,b:s.b,cl:env});break;
      case 'Give':return new RetSig(this.eval(s.v,env));
      case 'Stop':return new StopSig();
      case 'Skip':return new SkipSig();
      case 'Throw':{const v=this.eval(s.v,env);throw typeof v==='string'?new Error(v):v;}
      case 'Expr':this.eval(s.e,env);break;
      case 'Asgn':{
        const v=this.eval(s.v,env);
        const t=s.target;
        if(t.t==='Var')env.assign(t.n,v);
        else if(t.t==='Field'){const o=this.eval(t.o,env);o[t.f]=v;}
        else if(t.t==='Idx'){const o=this.eval(t.o,env);o[this.eval(t.i,env)]=v;}
        break;
      }
      case 'When':{
        if(this.truthy(this.eval(s.c,env)))return this.execBlock(s.th,new Env(env));
        for(const b of s.branches){
          if(b.c===null||this.truthy(this.eval(b.c,env)))return this.execBlock(b.b,new Env(env));
        }
        break;
      }
      case 'Loop':{
        while(true){
          const r=this.execBlock(s.b,new Env(env));
          if(r instanceof StopSig)break;
          if(r instanceof RetSig)return r;
        }
        break;
      }
      case 'Rep':{
        const n=Math.floor(this.eval(s.n,env));
        for(let i=0;i<n;i++){
          const fe=new Env(env);
          if(s.iter)fe.set(s.iter,i);
          const r=this.execBlock(s.b,fe);
          if(r instanceof StopSig)break;
          if(r instanceof SkipSig)continue;
          if(r instanceof RetSig)return r;
        }
        break;
      }
      case 'Each':{
        const arr=this.eval(s.arr,env);
        const items=Array.isArray(arr)?arr:Object.values(arr||{});
        for(const item of items){
          const fe=new Env(env);fe.set(s.n,item);
          const r=this.execBlock(s.b,fe);
          if(r instanceof StopSig)break;
          if(r instanceof SkipSig)continue;
          if(r instanceof RetSig)return r;
        }
        break;
      }
      case 'Try':{
        try{return this.execBlock(s.tb,new Env(env));}
        catch(e){
          const fe=new Env(env);
          fe.set(s.en,typeof e==='object'&&e?{message:e.message||String(e),line:e.snakeLine||0}:String(e));
          return this.execBlock(s.cb,fe);
        }
      }
      case 'Match':{
        const v=this.eval(s.v,env);
        for(const c of s.cases){
          if(this.eval(c.pat,env)===v)return this.execBlock(c.b,new Env(env));
        }
        break;
      }
    }
  },
  eval(node,env){
    switch(node.t){
      case 'Num':return node.v;
      case 'Bool':return node.v;
      case 'Null':return null;
      case 'Str':return this.interp(node.v,env);
      case 'Var':return env.get(node.n);
      case 'Arr':return node.els.map(e=>this.eval(e,env));
      case 'Obj':{const o={};node.pairs.forEach(p=>o[p.k]=this.eval(p.v,env));return o;}
      case 'Lambda':return{__fn__:true,ps:node.ps,b:node.b,cl:env};
      case 'Tern':return this.truthy(this.eval(node.c,env))?this.eval(node.a,env):this.eval(node.b,env);
      case 'Un':
        if(node.op==='-')return-this.eval(node.v,env);
        if(node.op==='!')return!this.truthy(this.eval(node.v,env));
        break;
      case 'Bin':{
        const L=this.eval(node.l,env),R=this.eval(node.r,env);
        switch(node.op){
          case '+':return(typeof L==='string'||typeof R==='string')?String(L)+String(R):L+R;
          case '-':return L-R;case '*':return L*R;
          case '/':if(R===0)throw new Error('Division by zero');return L/R;
          case '%':return L%R;case '..':return String(L)+String(R);
          case '==':return L===R;case '!=':return L!==R;
          case '<':return L<R;case '>':return L>R;case '<=':return L<=R;case '>=':return L>=R;
          case '&&':return this.truthy(L)&&this.truthy(R);
          case '||':return this.truthy(L)||this.truthy(R);
        }break;
      }
      case 'CallN':{
        const fn=env.get(node.n);
        const a=node.a.map(x=>this.eval(x,env));
        return this.callFn(fn,a);
      }
      case 'Call':{
        const fn=this.eval(node.f,env);
        const a=node.a.map(x=>this.eval(x,env));
        return this.callFn(fn,a);
      }
      case 'Field':{const o=this.eval(node.o,env);if(o===null||o===undefined)throw new Error('Cannot access field of null');return o[node.f]??null;}
      case 'Idx':{const o=this.eval(node.o,env);return o[this.eval(node.i,env)]??null;}
      case 'Method':{
        const o=this.eval(node.o,env);
        const a=node.a.map(x=>this.eval(x,env));
        if(o===null||o===undefined)throw new Error('Cannot call method on null');
        // built-in string methods
        if(typeof o==='string'){
          const sm={upper:()=>o.toUpperCase(),lower:()=>o.toLowerCase(),trim:()=>o.trim(),
            size:()=>o.length,length:()=>o.length,split:()=>o.split(a[0]??','),
            has:()=>o.includes(a[0]),replace:()=>o.replace(a[0],a[1]),
            startsWith:()=>o.startsWith(a[0]),endsWith:()=>o.endsWith(a[0]),
            indexOf:()=>o.indexOf(a[0]),slice:()=>o.slice(a[0],a[1])};
          if(sm[node.f])return sm[node.f]();
        }
        // built-in array methods
        if(Array.isArray(o)){
          const am={push:()=>{o.push(a[0]);return o;},pop:()=>o.pop(),
            size:()=>o.length,length:()=>o.length,join:()=>o.join(a[0]??', '),
            has:()=>o.includes(a[0]),indexOf:()=>o.indexOf(a[0]),
            reverse:()=>[...o].reverse(),slice:()=>o.slice(a[0],a[1]),
            map:()=>o.map(x=>this.callFn(a[0],[x])),
            filter:()=>o.filter(x=>this.truthy(this.callFn(a[0],[x]))),
            reduce:()=>o.reduce((acc,x)=>this.callFn(a[0],[acc,x]),a[1]),
            sort:()=>{const arr=[...o];a[0]?arr.sort((x,y)=>this.callFn(a[0],[x,y])):arr.sort();return arr;}};
          if(am[node.f])return am[node.f]();
        }
        // object methods
        if(typeof o==='object'){
          const om={keys:()=>Object.keys(o),values:()=>Object.values(o),
            has:()=>node.f in o,size:()=>Object.keys(o).length};
          if(om[node.f])return om[node.f]();
        }
        if(typeof o[node.f]==='function')return o[node.f](...a);
        throw new Error("No method '"+node.f+"' on "+this.str(o));
      }
    }
    return null;
  },
  interp(s,env){
    return s.replace(/\{([^}]+)\}/g,(_,e)=>{
      try{return this.str(this.eval(parse(tokenize(e))[0]?.e||{t:'Null'},env));}
      catch{return'{'+e+'}';}
    });
  },
  truthy(v){return v!==null&&v!==false&&v!==0&&v!==''&&v!==undefined;},
  str(v){
    if(v===null||v===undefined)return 'null';
    if(v===true)return 'true';if(v===false)return 'false';
    if(Array.isArray(v))return '['+v.map(x=>this.str(x)).join(', ')+']';
    if(typeof v==='object'&&!v.__fn__&&!v.__b__)return '{'+Object.entries(v).map(([k,vv])=>k+': '+this.str(vv)).join(', ')+'}';
    if(v&&(v.__fn__||v.__b__))return '[fn]';
    return String(v);
  }
};

<script>
// ── Syntax Highlight ──────────────────────────────────────────
const KWS=['let','const','fn','give','when','otherwise','loop','repeat','as',
  'each','in','try','catch','throw','stop','skip','match','case',
  'true','false','null','and','or','not','new'];
const BIS=['say','ask','size','num','text','floor','ceil','abs','rand','sqrt',
  'max','min','type','upper','lower','trim','split','join','push','pop',
  'has','keys','sort','reverse','map','filter','reduce','now','range'];

function highlight(code){
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let out='',i=0;
  while(i<code.length){
    // comment
    if(code[i]==='#'){
      let s='';while(i<code.length&&code[i]!=='\n')s+=code[i++];
      out+='<span class="c">'+esc(s)+'</span>';continue;
    }
    // string
    if(code[i]==='"'||code[i]==="'"){
      const q=code[i];let s=q;i++;
      while(i<code.length&&code[i]!==q){if(code[i]==='\\')s+=code[i++];s+=code[i++];}
      s+=q;i++;out+='<span class="s">'+esc(s)+'</span>';continue;
    }
    // number
    if(/\d/.test(code[i])){
      let s='';while(i<code.length&&/[\d.]/.test(code[i]))s+=code[i++];
      out+='<span class="n">'+s+'</span>';continue;
    }
    // ident/keyword
    if(/[a-zA-Z_]/.test(code[i])){
      let s='';while(i<code.length&&/\w/.test(code[i]))s+=code[i++];
      if(KWS.includes(s))out+='<span class="k">'+s+'</span>';
      else if(BIS.includes(s))out+='<span class="b">'+s+'</span>';
      else if(code[i]==='(')out+='<span class="f">'+s+'</span>';
      else out+='<span class="v">'+s+'</span>';
      continue;
    }
    out+=esc(code[i++]);
  }
  return out;
}

// ── VFS ───────────────────────────────────────────────────────
const vfs=new Map([['main.snk',''],['examples.snk','']]);
let activeFile='main.snk',openTabs=['main.snk'];

function renderFiles(){
  document.getElementById('file-list').innerHTML=[...vfs.keys()].map(n=>
    `<div class="fi ${n===activeFile?'active':''}" onclick="openFile('${n}')">
      <span class="fi-name">&#x1F4C4; ${n}</span>
      <button class="fi-x" onclick="event.stopPropagation();deleteFile('${n}')">&#x2715;</button>
      <span class="fi-dot"></span>
    </div>`
  ).join('');
  document.getElementById('tabs').innerHTML=openTabs.filter(n=>vfs.has(n)).map(n=>
    `<div class="tab ${n===activeFile?'active':''}" onclick="openFile('${n}')">
      &#x1F4C4; ${n}
      <span class="tab-x" onclick="event.stopPropagation();closeTab('${n}')"></span>
    </div>`
  ).join('');
}

function openFile(name){
  if(activeFile)vfs.set(activeFile,document.getElementById('editor').value);
  activeFile=name;
  if(!openTabs.includes(name))openTabs.push(name);
  document.getElementById('editor').value=vfs.get(name)||'';
  syncEditor();renderFiles();
}
function closeTab(name){
  openTabs=openTabs.filter(t=>t!==name);
  if(activeFile===name){activeFile=openTabs[openTabs.length-1]||null;document.getElementById('editor').value=activeFile?vfs.get(activeFile)||'':'';}
  syncEditor();renderFiles();
}
function newFile(){
  const n=prompt('File name:');if(!n)return;
  const name=n.includes('.')?n:n+'.snk';
  vfs.set(name,'');openFile(name);
}
function deleteFile(name){
  if(!confirm('Delete '+name+'?'))return;
  vfs.delete(name);openTabs=openTabs.filter(t=>t!==name);
  if(activeFile===name){activeFile=openTabs[0]||null;document.getElementById('editor').value=activeFile?vfs.get(activeFile)||'':'';}
  syncEditor();renderFiles();
}
function deleteActiveFile(){if(activeFile)deleteFile(activeFile);}
function saveFile(){if(activeFile){vfs.set(activeFile,document.getElementById('editor').value);tlog('Saved: '+activeFile,'ok');}}

// ── Editor ────────────────────────────────────────────────────
const ed=()=>document.getElementById('editor');
const hl=()=>document.getElementById('hl');
const ln=()=>document.getElementById('lnums');

function syncEditor(){
  const code=ed().value;
  hl().innerHTML=highlight(code)+'\n';
  const lines=code.split('\n');
  ln().innerHTML=lines.map((_,i)=>`<div class="${i===curLine()?'ln-cur':''}">${i+1}</div>`).join('');
  ln().scrollTop=ed().scrollTop;
  hl().scrollTop=ed().scrollTop;
  hl().scrollLeft=ed().scrollLeft;
  if(activeFile)vfs.set(activeFile,code);
  updateOutline();updateStatus();
}
function curLine(){
  const v=ed().value.substring(0,ed().selectionStart);
  return v.split('\n').length-1;
}
function updateStatus(){
  const v=ed().value.substring(0,ed().selectionStart);
  const lines=v.split('\n');
  document.getElementById('sb-pos').textContent='Ln '+lines.length+', Col '+(lines[lines.length-1].length+1);
  const sel=Math.abs(ed().selectionEnd-ed().selectionStart);
  const selEl=document.getElementById('sb-sel');
  if(sel){selEl.textContent='('+sel+' selected)';selEl.style.display='flex';}
  else selEl.style.display='none';
}
function updateOutline(){
  const lines=ed().value.split('\n');
  const items=[];
  lines.forEach((l,i)=>{
    const fm=l.match(/^\s*fn\s+(\w+)/);if(fm)items.push({n:fm[1],l:i+1,k:'fn'});
    const lm=l.match(/^\s*(let|const)\s+(\w+)/);if(lm)items.push({n:lm[2],l:i+1,k:'var'});
  });
  document.getElementById('outline').innerHTML=items.map(it=>
    `<div class="ol-item ol-${it.k==='fn'?'fn':'var'}" onclick="gotoLine(${it.l})">
      ${it.k==='fn'?'&#x26A1;':'&#x25C6;'} ${it.n} <span style="color:#555;font-size:10px">:${it.l}</span>
    </div>`
  ).join('');
}
function gotoLine(n){
  const lines=ed().value.split('\n');
  let pos=0;for(let i=0;i<n-1;i++)pos+=lines[i].length+1;
  ed().focus();ed().selectionStart=ed().selectionEnd=pos;
  ed().scrollTop=(n-3)*20;syncEditor();
}

ed().addEventListener('input',syncEditor);
ed().addEventListener('scroll',()=>{hl().scrollTop=ed().scrollTop;hl().scrollLeft=ed().scrollLeft;ln().scrollTop=ed().scrollTop;});
ed().addEventListener('click',updateStatus);
ed().addEventListener('keyup',updateStatus);
ed().addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();runCode();return;}
  if(e.ctrlKey&&e.key==='s'){e.preventDefault();saveFile();return;}
  if(e.ctrlKey&&e.key==='f'){e.preventDefault();toggleFind();return;}
  if(e.ctrlKey&&e.key==='/'){e.preventDefault();toggleComment();return;}
  if(e.ctrlKey&&e.key===' '){e.preventDefault();showAC();return;}
  if(e.key==='Escape'){toggleFind(false);hideAC();return;}
  if(e.key==='Tab'){
    e.preventDefault();
    const s=ed().selectionStart,en=ed().selectionEnd,v=ed().value;
    if(s!==en){
      const before=v.slice(0,s),sel=v.slice(s,en),after=v.slice(en);
      if(e.shiftKey){const u=sel.replace(/^    /gm,'');ed().value=before+u+after;ed().selectionStart=s;ed().selectionEnd=s+u.length;}
      else{const ind=sel.replace(/^/gm,'    ');ed().value=before+ind+after;ed().selectionStart=s;ed().selectionEnd=s+ind.length;}
    }else{ed().value=v.slice(0,s)+'    '+v.slice(en);ed().selectionStart=ed().selectionEnd=s+4;}
    syncEditor();return;
  }
  if(e.key==='Enter'){
    const s=ed().selectionStart,v=ed().value;
    const ls=v.lastIndexOf('\n',s-1)+1;
    const line=v.slice(ls,s);
    const indent=line.match(/^(\s*)/)[1];
    const extra=line.trimEnd().endsWith('{')?'    ':'';
    e.preventDefault();
    const ins='\n'+indent+extra;
    ed().value=v.slice(0,s)+ins+v.slice(ed().selectionEnd);
    ed().selectionStart=ed().selectionEnd=s+ins.length;
    syncEditor();return;
  }
  // AC navigation
  const ac=document.getElementById('ac');
  if(ac.style.display==='block'){
    if(e.key==='ArrowDown'){e.preventDefault();acNav(1);return;}
    if(e.key==='ArrowUp'){e.preventDefault();acNav(-1);return;}
    if(e.key==='Enter'||e.key==='Tab'){const sel=ac.querySelector('.sel');if(sel){e.preventDefault();applyAC(sel.dataset.word);return;}}
  }
});
function toggleComment(){
  const s=ed().selectionStart,v=ed().value;
  const ls=v.lastIndexOf('\n',s-1)+1;
  const le=v.indexOf('\n',s);const end=le===-1?v.length:le;
  const line=v.slice(ls,end);
  const nl=line.trimStart().startsWith('#')?line.replace(/^(\s*)#\s?/,'$1'):line.replace(/^(\s*)/,'$1# ');
  ed().value=v.slice(0,ls)+nl+v.slice(end);
  const d=nl.length-line.length;ed().selectionStart=s+d;ed().selectionEnd=s+d;
  syncEditor();
}

// ── Autocomplete ──────────────────────────────────────────────
const AC_LIST=[...KWS.map(w=>({w,t:'kw'})),...BIS.map(w=>({w,t:'builtin'})),
  {w:'PI',t:'const'},{w:'E',t:'const'},{w:'INF',t:'const'}];
let acSel=0,acWords=[];
function showAC(){
  const s=ed().selectionStart,before=ed().value.slice(0,s);
  const m=before.match(/[a-zA-Z_]\w*$/);const prefix=m?m[0]:'';
  acWords=AC_LIST.filter(a=>a.w.startsWith(prefix)&&a.w!==prefix);
  if(!acWords.length){hideAC();return;}
  acSel=0;
  const ac=document.getElementById('ac');
  ac.innerHTML=acWords.map((a,i)=>
    `<div class="ac-i ${i===0?'sel':''}" data-word="${a.w}" onclick="applyAC('${a.w}')">
      ${a.w}<span class="ac-t">${a.t}</span>
    </div>`
  ).join('');
  // position near cursor
  const rect=ed().getBoundingClientRect();
  const lines=ed().value.slice(0,s).split('\n');
  const row=lines.length,col=lines[lines.length-1].length;
  ac.style.left=(rect.left+44+col*7.8-ed().scrollLeft)+'px';
  ac.style.top=(rect.top+row*20-ed().scrollTop+20)+'px';
  ac.style.display='block';
}
function acNav(d){
  acSel=Math.max(0,Math.min(acWords.length-1,acSel+d));
  document.querySelectorAll('.ac-i').forEach((el,i)=>el.classList.toggle('sel',i===acSel));
  document.querySelectorAll('.ac-i')[acSel]?.scrollIntoView({block:'nearest'});
}
function applyAC(word){
  const s=ed().selectionStart,before=ed().value.slice(0,s);
  const m=before.match(/[a-zA-Z_]\w*$/);const prefix=m?m[0]:'';
  const start=s-prefix.length;
  ed().value=ed().value.slice(0,start)+word+ed().value.slice(s);
  ed().selectionStart=ed().selectionEnd=start+word.length;
  hideAC();syncEditor();
}
function hideAC(){document.getElementById('ac').style.display='none';}
document.addEventListener('click',e=>{if(!document.getElementById('ac').contains(e.target))hideAC();});
</script>
<script>
// ── Terminal ──────────────────────────────────────────────────
let termHist=[],termHistIdx=-1;
function tlog(msg,cls){
  const d=document.createElement('div');
  d.className='tl'+(cls?' '+cls:'');
  d.textContent=msg;
  const out=document.getElementById('panel-terminal');
  out.appendChild(d);out.scrollTop=out.scrollHeight;
}
function clearPanel(){
  document.getElementById('panel-terminal').innerHTML='';
  document.getElementById('panel-output').innerHTML='';
}
function switchPanel(name){
  document.querySelectorAll('.ptab').forEach((t,i)=>t.classList.toggle('active',['terminal','output'][i]===name));
  document.querySelectorAll('.tpanel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}
document.getElementById('term-in').addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const cmd=e.target.value.trim();if(!cmd)return;
    termHist.unshift(cmd);termHistIdx=-1;
    tlog('snake:~$ '+cmd,'cmd');
    e.target.value='';
    runCmd(cmd);
  }
  if(e.key==='ArrowUp'){termHistIdx=Math.min(termHistIdx+1,termHist.length-1);e.target.value=termHist[termHistIdx]||'';}
  if(e.key==='ArrowDown'){termHistIdx=Math.max(termHistIdx-1,-1);e.target.value=termHistIdx>=0?termHist[termHistIdx]:'';}
  if(e.ctrlKey&&e.key==='l'){e.preventDefault();clearPanel();}
});
function runCmd(cmd){
  const p=cmd.trim().split(/\s+/);
  switch(p[0]){
    case 'help':
      ['run          — run current file','run <file>   — run specific file',
       'clear        — clear terminal','ls           — list files',
       'cat <file>   — show file content','new <name>   — create file',
       'rm <name>    — delete file','save         — save current file',
       'date         — show date/time','echo <text>  — print text',
       'version      — show version'].forEach(l=>tlog('  '+l));break;
    case 'run':runFile(p[1]||activeFile);break;
    case 'clear':clearPanel();break;
    case 'ls':[...vfs.keys()].forEach(n=>tlog('  '+(n===activeFile?'> ':' ')+n));break;
    case 'cat':{const c=vfs.get(p[1]);c!==undefined?tlog(c):tlog('Not found: '+p[1],'err');break;}
    case 'new':{const n=p[1];if(!n){tlog('Usage: new <name>','warn');break;}const name=n.includes('.')?n:n+'.snk';vfs.set(name,'');openFile(name);tlog('Created: '+name,'ok');break;}
    case 'rm':{if(!p[1]){tlog('Usage: rm <name>','warn');break;}if(!vfs.has(p[1])){tlog('Not found: '+p[1],'err');break;}deleteFile(p[1]);break;}
    case 'save':saveFile();break;
    case 'date':tlog(new Date().toLocaleString());break;
    case 'echo':tlog(p.slice(1).join(' '));break;
    case 'version':tlog('Snake IDE v3.0 — Snake Lang v3.0');break;
    default:tlog("Unknown: '"+p[0]+"' — type 'help'","err");
  }
}

// ── Find ──────────────────────────────────────────────────────
const Find={
  matches:[],idx:0,_case:false,_regex:false,
  search(q){
    this.matches=[];this.idx=0;
    if(!q){document.getElementById('find-count').textContent='';return;}
    try{
      const flags=this._case?'g':'gi';
      const pat=this._regex?new RegExp(q,flags):new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),flags);
      let m;const text=ed().value;
      while((m=pat.exec(text))!==null)this.matches.push({s:m.index,e:m.index+m[0].length});
    }catch{}
    document.getElementById('find-count').textContent=this.matches.length?(this.idx+1)+'/'+this.matches.length:'No results';
    if(this.matches.length)this._sel(0);
  },
  key(e){if(e.key==='Enter'){e.shiftKey?this.prev():this.next();}if(e.key==='Escape')toggleFind(false);},
  next(){if(!this.matches.length)return;this.idx=(this.idx+1)%this.matches.length;this._sel(this.idx);},
  prev(){if(!this.matches.length)return;this.idx=(this.idx-1+this.matches.length)%this.matches.length;this._sel(this.idx);},
  _sel(i){const m=this.matches[i];ed().focus();ed().setSelectionRange(m.s,m.e);document.getElementById('find-count').textContent=(i+1)+'/'+this.matches.length;ed().scrollTop=Math.max(0,ed().value.slice(0,m.s).split('\n').length*20-100);},
  toggleCase(){this._case=!this._case;document.getElementById('fb-case').classList.toggle('on',this._case);this.search(document.getElementById('find-input').value);},
  toggleRegex(){this._regex=!this._regex;document.getElementById('fb-regex').classList.toggle('on',this._regex);this.search(document.getElementById('find-input').value);},
  replaceOne(){if(!this.matches.length)return;const m=this.matches[this.idx];const rep=document.getElementById('replace-input').value;ed().value=ed().value.slice(0,m.s)+rep+ed().value.slice(m.e);syncEditor();this.search(document.getElementById('find-input').value);},
  replaceAll(){const q=document.getElementById('find-input').value,rep=document.getElementById('replace-input').value;if(!q)return;try{const flags=this._case?'g':'gi';const pat=this._regex?new RegExp(q,flags):new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),flags);ed().value=ed().value.replace(pat,rep);syncEditor();this.search(q);}catch{}}
};
function toggleFind(show){
  const fb=document.getElementById('find-bar');
  if(show===false){fb.classList.remove('show');return;}
  fb.classList.toggle('show');
  if(fb.classList.contains('show')){document.getElementById('find-input').focus();document.getElementById('find-input').select();}
}

// ── Run ───────────────────────────────────────────────────────
function runCode(){
  if(activeFile)vfs.set(activeFile,ed().value);
  runFile(activeFile);
}
function runFile(name){
  const src=vfs.get(name)||'';
  tlog('--- Running '+name+' ---','info');
  const t0=performance.now();
  try{
    Engine.run(src);
    tlog('Done in '+(performance.now()-t0).toFixed(1)+'ms','ok');
  }catch(e){
    const loc=e.snakeLine?' (line '+e.snakeLine+')':'';
    tlog('Error'+loc+': '+e.message,'err');
  }
  document.getElementById('sb-status').textContent='Last run: '+new Date().toLocaleTimeString();
}

// ── Init ──────────────────────────────────────────────────────
renderFiles();
openFile('main.snk');
</script>
</body></html>
